<!DOCTYPE html>
<html lang="en-IN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fever Watch | Monsoon Fever Risk in Your City | PharmEasy</title>
<meta name="description" content="A daily risk read for India's top monsoon fevers (dengue, malaria, chikungunya, typhoid and viral fever) in your city, from breeding weather, search interest and lab positivity. A risk indicator, not a diagnosis." />
<meta name="theme-color" content="#10847E" />
<meta property="og:title" content="Fever Watch by PharmEasy" />
<meta property="og:description" content="Daily monsoon-fever risk for your city. A risk indicator, not a diagnosis or a case count." />
<meta property="og:type" content="website" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif; color: #1f1f1f; background: #faf8f5; }
  button { cursor: pointer; font-family: inherit; }
  select { font-family: inherit; }
  .page { max-width: 460px; margin: 0 auto; padding: 18px; min-height: 100vh; }
  .header { margin-bottom: 18px; }
  .brandRow { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .logo { font-weight: 800; color: #10847e; font-size: 18px; letter-spacing: -0.5px; }
  .beta { font-size: 9.5px; font-weight: 700; color: #a36; letter-spacing: 1.5px; border: 1px solid #b08888; padding: 3px 7px; border-radius: 20px; }
  .h1 { font-family: Georgia, serif; font-size: 30px; margin: 0 0 6px; font-weight: 800; line-height: 1.1; }
  .sub { font-size: 13.5px; color: #6a6a6a; margin: 0; line-height: 1.5; }
  .controls { margin-bottom: 14px; }
  .select { width: 100%; padding: 11px 12px; border-radius: 12px; border: 1px solid #ddd; font-size: 15px; font-weight: 600; background: #fff; margin-bottom: 10px; }
  .illRow { display: flex; flex-wrap: wrap; gap: 7px; }
  .pill { border: 1px solid #ddd; background: #fff; border-radius: 20px; padding: 7px 12px; font-size: 12.5px; font-weight: 600; color: #555; display: inline-flex; align-items: center; gap: 5px; }
  .pill.active { background: #10847e; color: #fff; border-color: #10847e; }
  .tabs { display: flex; gap: 6px; margin-bottom: 14px; background: #efece7; padding: 4px; border-radius: 12px; }
  .tab { flex: 1; padding: 9px 0; border: none; background: transparent; border-radius: 9px; font-size: 13px; font-weight: 600; color: #888; }
  .tab.active { background: #fff; color: #10847e; box-shadow: 0 1px 4px #0000000f; }
  .card { background: #fff; border: 1px solid #ececec; border-radius: 16px; padding: 18px; margin-bottom: 14px; box-shadow: 0 1px 3px #0000000a; }
  .scoreTop { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .illTitle { font-size: 14px; color: #555; margin-bottom: 6px; font-weight: 600; }
  .bandLabel { font-size: 24px; font-weight: 800; font-family: Georgia, serif; }
  .confRow { margin-top: 12px; }
  .confTag { font-size: 11.5px; font-weight: 700; border: 1.5px solid; border-radius: 20px; padding: 4px 10px; display: inline-block; }
  .note { font-size: 13px; color: #555; line-height: 1.55; margin: 12px 0 0; }
  .cardTitle { font-size: 16px; font-weight: 800; font-family: Georgia, serif; }
  .breakHead { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .toggle { font-size: 12px; color: #10847e; font-weight: 700; }
  .fine { font-size: 11px; color: #999; line-height: 1.5; margin-top: 10px; margin-bottom: 0; }
  .actionList { list-style: none; padding: 0; margin: 12px 0 16px; }
  .actionItem { font-size: 13.5px; color: #333; padding: 7px 0; border-bottom: 1px solid #f3f3f3; display: flex; gap: 8px; line-height: 1.4; }
  .cta { width: 100%; border: none; color: #fff; padding: 13px; border-radius: 12px; font-size: 14.5px; font-weight: 700; }
  .disclaimer { font-size: 10.5px; color: #aaa; margin-top: 10px; margin-bottom: 0; line-height: 1.5; text-align: center; }
  .lbRow { display: flex; align-items: center; gap: 9px; padding: 7px 0; font-size: 13.5px; }
  .lbRank { width: 18px; color: #aaa; font-weight: 700; }
  .lbBar { width: 70px; height: 7px; background: #0000000d; border-radius: 4px; overflow: hidden; }
  .lbFill { display: block; height: 100%; border-radius: 4px; }
  .sub2 { font-size: 13px; color: #777; margin: 6px 0 16px; line-height: 1.5; }
  .qBlock { margin-bottom: 16px; }
  .qText { font-size: 14px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
  .qOpts { display: flex; gap: 8px; }
  .qOpt { flex: 1; padding: 10px; border: 1px solid #ddd; background: #fff; border-radius: 10px; font-size: 12.5px; font-weight: 600; color: #555; }
  .qOpt.risky { border-color: #d64545; background: #fbe9e9; color: #d64545; }
  .qOpt.safe { border-color: #3f9d6f; background: #e8f5ee; color: #3f9d6f; }
  .resultBox { border: 2px solid; border-radius: 14px; padding: 18px; margin-top: 8px; text-align: center; }
  .resultNum { font-family: Georgia, serif; font-size: 52px; font-weight: 800; line-height: 1; }
  .resultOf { font-size: 20px; color: #aaa; }
  .resultLabel { font-size: 15px; font-weight: 700; margin-top: 4px; }
  .resultNote { font-size: 12.5px; color: #777; margin: 8px 0 14px; line-height: 1.5; }
  .shareCard { border-radius: 18px; padding: 30px 20px; text-align: center; color: #fff; margin-top: 8px; }
  .scTop { font-size: 12px; font-weight: 700; opacity: 0.9; letter-spacing: 0.3px; }
  .scEmoji { font-size: 44px; margin: 14px 0 4px; }
  .scScore { font-size: 64px; font-weight: 800; font-family: Georgia, serif; line-height: 1; }
  .scOf { font-size: 24px; opacity: 0.8; }
  .scBand { font-size: 18px; font-weight: 800; letter-spacing: 2px; margin-top: 4px; }
  .scCity { font-size: 14px; opacity: 0.95; margin-top: 10px; }
  .scFoot { font-size: 13px; font-weight: 600; margin-top: 16px; opacity: 0.95; }
  .shareBtns { display: flex; gap: 8px; margin-top: 14px; }
  .shareBtn { flex: 1; border: none; color: #fff; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 700; }
  .signal { margin-bottom: 16px; }
  .sigHead { display: flex; justify-content: space-between; align-items: baseline; }
  .sigLabel { font-size: 14px; font-weight: 600; color: #2a2a2a; }
  .sigVal { font-size: 13px; font-weight: 700; }
  .sigTag { font-size: 11.5px; color: #8a8a8a; margin: 2px 0 5px; }
  .sigTrack { height: 7px; background: #0000000d; border-radius: 4px; overflow: hidden; }
  .sigFill { height: 100%; border-radius: 4px; transition: width .7s; }
  .footer { font-size: 10.5px; color: #aaa; text-align: center; line-height: 1.6; margin-top: 8px; padding-bottom: 20px; }
  .loading { text-align: center; color: #888; padding: 40px 0; }
  @media (max-width: 520px) { .page { padding: 14px; } }
</style>
</head>
<body>
<div id="app"><div class="page"><div class="loading">Loading Fever Watch...</div></div></div>
<noscript><div class="page"><p>Fever Watch needs JavaScript to render the live risk view.</p></div></noscript>
<script>
(function () {
  "use strict";

  // ---- static content (per-disease actions + the vulnerability quiz) --------
  var ACTIONS = {
    dengue: {
      high: ["Cover up after dusk and use repellent indoors", "Empty any standing water today (coolers, pots, trays)", "Fever with body ache for 2 days or more? Consider a dengue NS1 or platelet test"],
      low: ["Keep windows screened in the evening", "Check for standing water weekly", "Keep a repellent handy during monsoon"]
    },
    malaria: {
      high: ["Use a bed net and repellent, especially around dawn and dusk", "Clear stagnant water near the home", "Fever with chills and sweating? Ask about a malaria test"],
      low: ["Screen windows and use repellent in the evening", "Drain standing water weekly"]
    },
    chikungunya: {
      high: ["Use repellent through the day, Aedes bites in daylight", "Remove standing water around the home today", "Fever with severe joint pain? Consider a chikungunya test"],
      low: ["Keep evenings screened and covered", "Check pots, trays and drains weekly"]
    },
    typhoid: {
      high: ["Drink only boiled or sealed water", "Avoid cut fruit and street food during heavy rain", "Fever for 3 days or more with stomach upset? Consider a typhoid test", "Ask your doctor about typhoid vaccination"],
      low: ["Wash hands before eating", "Prefer freshly cooked, hot food"]
    },
    viral_fever: {
      high: ["Rest and take fluids, isolate if feverish", "Persistent fever for 3 days or more? Book a fever panel", "Do not self-medicate with antibiotics"],
      low: ["Wash hands and ventilate rooms", "Watch for fever in children and the elderly"]
    }
  };

  var QUIZ = [
    { q: "Is there any standing water around your home (coolers, pots, trays, drains)?", risky: "Yes or not sure", safe: "No, I check regularly" },
    { q: "Do you use mosquito protection in the evenings (nets, repellent, screens)?", risky: "Rarely or never", safe: "Most evenings" },
    { q: "Anyone at home elderly, pregnant, or with a chronic condition?", risky: "Yes", safe: "No" },
    { q: "Has anyone in your home or building had fever recently?", risky: "Yes", safe: "No" },
    { q: "Do you or family go out around dawn or dusk without cover?", risky: "Often", safe: "Rarely" }
  ];

  var BANDS_FALLBACK = [
    { label: "HIGH", min: 70, color: "#d64545", soft: "#fbe9e9", emoji: "🔴" },
    { label: "MODERATE", min: 45, color: "#d98a2b", soft: "#fbf1e3", emoji: "🟠" },
    { label: "LOW-MODERATE", min: 25, color: "#c2a93a", soft: "#f9f6e7", emoji: "🟡" },
    { label: "LOW", min: 0, color: "#3f9d6f", soft: "#e8f5ee", emoji: "🟢" }
  ];

  var app = document.getElementById("app");
  var DATA = null;
  var BANDS = BANDS_FALLBACK;
  var state = { cityId: null, diseaseId: null, tab: "score", quiz: {}, showBreakdown: true };

  init();

  function init() {
    fetch("./data/grid.json", { cache: "no-store" })
      .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(function (json) {
        DATA = json;
        if (DATA.bands && DATA.bands.length) BANDS = DATA.bands;
        state.cityId = pickDefaultCity();
        state.diseaseId = pickDefaultDisease();
        app.addEventListener("click", onClick);
        app.addEventListener("change", onChange);
        render();
      })
      .catch(function (err) {
        app.innerHTML = '<div class="page"><div class="card"><p>Could not load risk data (' + esc(err.message) + ').</p><p class="fine">Run <code>python src/build_weather.py</code> then <code>python src/build_daily.py</code> to generate data/grid.json.</p></div></div>';
      });
  }

  function pickDefaultCity() {
    var has = DATA.cities.some(function (c) { return c.id === "pune"; });
    return has ? "pune" : DATA.cities[0].id;
  }
  function pickDefaultDisease() {
    var flag = DATA.diseases.filter(function (d) { return d.flagship; })[0];
    return flag ? flag.id : DATA.diseases[0].id;
  }

  // ---- lookups --------------------------------------------------------------
  function cityById(id) { return DATA.cities.filter(function (c) { return c.id === id; })[0]; }
  function diseaseById(id) { return DATA.diseases.filter(function (d) { return d.id === id; })[0]; }
  function cell(cityId, diseaseId) {
    return DATA.grid.filter(function (r) { return r.city === cityId && r.disease === diseaseId; })[0];
  }
  function bandFor(score) {
    for (var i = 0; i < BANDS.length; i++) { if (score >= BANDS[i].min) return BANDS[i]; }
    return BANDS[BANDS.length - 1];
  }

  // ---- render ---------------------------------------------------------------
  function render() {
    var c = cityById(state.cityId), d = diseaseById(state.diseaseId), cl = cell(state.cityId, state.diseaseId);
    var body =
      state.tab === "score" ? scoreView(c, d, cl) :
      state.tab === "quiz" ? quizView(c, d, cl) :
      shareView(c, d, cl);
    app.innerHTML =
      '<div class="page">' + header() + controls() + tabs() + body + footer() + '</div>';
  }

  function header() {
    return '<header class="header">' +
      '<div class="brandRow"><span class="logo">+ PharmEasy</span><span class="beta">LABS PREVIEW</span></div>' +
      '<h1 class="h1">Fever Watch</h1>' +
      '<p class="sub">Live monsoon-fever risk for your city, from breeding weather, search interest and lab signals, in one score.</p>' +
      '</header>';
  }

  function controls() {
    var opts = DATA.cities.map(function (ci) {
      return '<option value="' + ci.id + '"' + (ci.id === state.cityId ? " selected" : "") + '>📍 ' + esc(ci.name) + '</option>';
    }).join("");
    var pills = DATA.diseases.map(function (di) {
      return '<button class="pill' + (di.id === state.diseaseId ? " active" : "") + '" data-act="disease" data-id="' + di.id + '">' +
        '<span>' + di.emoji + '</span> ' + esc(di.label) + (di.flagship ? " ★" : "") + '</button>';
    }).join("");
    return '<div class="controls"><select class="select" data-act="city">' + opts + '</select>' +
      '<div class="illRow">' + pills + '</div></div>';
  }

  function tabs() {
    var T = [["score", "Risk Score"], ["quiz", "Am I At Risk?"], ["share", "Share"]];
    return '<div class="tabs">' + T.map(function (t) {
      return '<button class="tab' + (state.tab === t[0] ? " active" : "") + '" data-act="tab" data-tab="' + t[0] + '">' + t[1] + '</button>';
    }).join("") + '</div>';
  }

  function scoreView(c, d, cl) {
    if (!cl) return '<div class="card"><p>No data for this selection yet.</p></div>';
    var high = cl.band === "HIGH";
    var main = '<div class="card" style="background:' + cl.soft + ';border-color:' + cl.color + '">' +
      '<div class="scoreTop"><div>' +
      '<div class="illTitle">' + d.emoji + " " + esc(d.label) + " risk in " + esc(c.name) + '</div>' +
      '<div class="bandLabel" style="color:' + cl.color + '">' + cl.emoji + " " + cl.band + '</div>' +
      '</div>' + dial(cl.score, cl.color) + '</div>' +
      '<div class="confRow"><span class="confTag" style="border-color:' + cl.color + ';color:' + cl.color + '">Confidence: ' + esc(cl.confidence) + '</span></div>' +
      '<p class="note">' + esc(cl.note) + '</p></div>';
    return main + breakdown(c, cl) + actionsCard(c, d, cl, high) + leaderboard(d);
  }

  function breakdown(c, cl) {
    var s = cl.signals, w = cl.weights;
    var inner = "";
    if (state.showBreakdown) {
      var wsum = c.weather || {};
      inner = '<div style="margin-top:14px">' +
        signalRow("🦟 Weather and breeding conditions", "Leading. Conditions weeks ahead.", s.weather, w.weather, "#3f7fd9") +
        signalRow("🔍 Search interest", s.news_spike ? "Coincident. Possible news spike, down-weighted." : "Coincident. Public concern.", s.trends, w.trends, "#9a6fd9") +
        signalRow("🧪 PharmEasy fever-panel positivity", s.positivity == null ? "No confirmed-case data here yet." : "Lagging. Confirmed positivity, the ground truth.", s.positivity, w.positivity, "#d96f9a") +
        '<p class="fine">Live weather: ' + fmt(wsum.temp_mean_c) + "C, " + fmt(wsum.humidity_pct) + "% RH, " + fmt(wsum.rain_14d_mm) + "mm rain (last 14 days). Search and positivity are simulated in this preview; real feeds drop into the same slots.</p>" +
        '</div>';
    }
    return '<div class="card"><div class="breakHead" data-act="toggleBreak">' +
      '<span class="cardTitle">Why this score?</span>' +
      '<span class="toggle">' + (state.showBreakdown ? "Hide" : "Show") + " signals</span></div>" + inner + "</div>";
  }

  function signalRow(label, tag, value, weight, color) {
    var absent = value == null;
    var valTxt = (absent ? "-" : value) + (weight > 0 ? " (" + weight + "%)" : "");
    return '<div class="signal" style="opacity:' + (absent ? 0.5 : 1) + '">' +
      '<div class="sigHead"><span class="sigLabel">' + label + '</span>' +
      '<span class="sigVal" style="color:' + color + '">' + valTxt + '</span></div>' +
      '<div class="sigTag">' + tag + '</div>' +
      '<div class="sigTrack"><div class="sigFill" style="width:' + (absent ? 0 : value) + '%;background:' + color + '"></div></div></div>';
  }

  function actionsCard(c, d, cl, high) {
    var pack = ACTIONS[d.id] || { high: [], low: [] };
    var acts = high ? pack.high : pack.low;
    var items = acts.map(function (a) {
      return '<li class="actionItem"><span style="color:' + cl.color + ';font-weight:700">›</span> ' + esc(a) + '</li>';
    }).join("");
    return '<div class="card"><span class="cardTitle">What to do ' + (high ? "now" : "this week") + '</span>' +
      '<ul class="actionList">' + items + '</ul>' +
      '<button class="cta" data-act="cta" style="background:' + cl.color + '">' + (high ? "Book a fever panel test →" : "Shop prevention essentials →") + '</button>' +
      '<p class="disclaimer">This is a weather and trend based risk indicator, not a medical diagnosis or a count of actual mosquitoes or cases.</p></div>';
  }

  function leaderboard(d) {
    var rows = DATA.cities.map(function (ci) {
      var cl = cell(ci.id, d.id);
      return { id: ci.id, name: ci.name, score: cl ? cl.score : 0 };
    }).sort(function (a, b) { return b.score - a.score; });
    var html = rows.map(function (r, i) {
      var b = bandFor(r.score);
      return '<div class="lbRow" style="font-weight:' + (r.id === state.cityId ? 700 : 400) + '">' +
        '<span class="lbRank">' + (i + 1) + '</span>' +
        '<span style="flex:1">' + esc(r.name) + (r.id === state.cityId ? " (you)" : "") + '</span>' +
        '<span class="lbBar"><span class="lbFill" style="width:' + r.score + '%;background:' + b.color + '"></span></span>' +
        '<span style="width:30px;text-align:right;color:' + b.color + ';font-weight:700">' + r.score + '</span></div>';
    }).join("");
    return '<div class="card"><span class="cardTitle">🏆 India ' + esc(d.label) + ' risk leaderboard this week</span>' +
      '<div style="margin-top:12px">' + html + '</div></div>';
  }

  function quizView(c, d, cl) {
    var done = Object.keys(state.quiz).length === QUIZ.length;
    var qs = QUIZ.map(function (item, idx) {
      var sel = state.quiz[idx];
      return '<div class="qBlock"><div class="qText">' + (idx + 1) + ". " + esc(item.q) + '</div>' +
        '<div class="qOpts">' +
        '<button class="qOpt' + (sel === "risky" ? " risky" : "") + '" data-act="quiz" data-idx="' + idx + '" data-val="risky">' + esc(item.risky) + '</button>' +
        '<button class="qOpt' + (sel === "safe" ? " safe" : "") + '" data-act="quiz" data-idx="' + idx + '" data-val="safe">' + esc(item.safe) + '</button>' +
        '</div></div>';
    }).join("");
    var result = done && cl ? quizResult(c, d, cl) : "";
    return '<div class="card"><span class="cardTitle">How protected is your home?</span>' +
      '<p class="sub2">5 quick questions for your personal risk, blended with ' + esc(c.name) + "'s live conditions.</p>" +
      qs + result + '</div>';
  }

  function quizResult(c, d, cl) {
    var p = personalScore();
    var combined = Math.round(0.55 * p + 0.45 * cl.score);
    var b = bandFor(combined);
    return '<div class="resultBox" style="border-color:' + b.color + '">' +
      '<div class="resultNum"><span style="color:' + b.color + '">' + combined + '</span><span class="resultOf">/100</span></div>' +
      '<div class="resultLabel">Your ' + esc(d.label) + ' vulnerability score: ' + b.label + '</div>' +
      '<p class="resultNote">Based on your home setup (' + p + '/100) blended with ' + esc(c.name) + "'s current " + esc(d.label) + ' risk (' + cl.score + '/100).</p>' +
      '<button class="cta" style="background:' + b.color + '" data-act="tab" data-tab="share">Share my score and warn my family →</button></div>';
  }

  function personalScore() {
    var risky = 0;
    for (var k in state.quiz) { if (state.quiz[k] === "risky") risky++; }
    return Math.round((risky / QUIZ.length) * 100);
  }

  function shareView(c, d, cl) {
    var done = Object.keys(state.quiz).length === QUIZ.length;
    var personal = done && cl;
    var score = personal ? Math.round(0.55 * personalScore() + 0.45 * cl.score) : (cl ? cl.score : 0);
    var b = bandFor(score);
    var card = '<div class="shareCard" style="background:linear-gradient(155deg,' + b.color + ' 0%,' + shade(b.color) + ' 100%)">' +
      '<div class="scTop">PharmEasy Fever Watch</div>' +
      '<div class="scEmoji">' + d.emoji + '</div>' +
      '<div class="scScore">' + score + '<span class="scOf">/100</span></div>' +
      '<div class="scBand">' + b.label + ' RISK</div>' +
      '<div class="scCity">' + (personal ? "My " + esc(d.label) + " vulnerability" : esc(d.label) + " risk") + " in " + esc(c.name) + '</div>' +
      '<div class="scFoot">' + (b.label === "HIGH" ? "Protect your family this evening 🛡️" : "Stay aware. Check yours →") + '</div></div>';
    return '<div class="card"><span class="cardTitle">Your shareable card</span>' +
      '<p class="sub2">This is the WhatsApp and Stories ready image users forward. Built to travel outside the app.</p>' +
      card +
      '<div class="shareBtns">' +
      '<button class="shareBtn" style="background:#25D366" data-act="share-wa">WhatsApp</button>' +
      '<button class="shareBtn" style="background:#000" data-act="share-ig">Instagram Story</button>' +
      '<button class="shareBtn" style="background:#3f7fd9" data-act="share-link">Copy link</button>' +
      '</div>' +
      '<p class="fine">In production these export the card as an image with a deep link back to your city view.</p></div>';
  }

  function footer() {
    var updated = DATA.generated_at ? " Updated " + esc(DATA.generated_at) + "." : "";
    return '<footer class="footer">Preview build. Engine: confirmation-weighted ensemble of breeding weather, search interest and PharmEasy positivity. Live weather via NASA POWER (public domain). Search and positivity are simulated in this preview.' + updated + '</footer>';
  }

  // ---- small helpers --------------------------------------------------------
  function dial(score, color) {
    var r = 42, circ = 2 * Math.PI * r, off = circ - (score / 100) * circ;
    return '<svg width="110" height="110" viewBox="0 0 110 110" style="flex-shrink:0" aria-label="Risk score ' + score + ' out of 100">' +
      '<circle cx="55" cy="55" r="' + r + '" fill="none" stroke="#00000012" stroke-width="11"></circle>' +
      '<circle cx="55" cy="55" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="11" stroke-linecap="round" stroke-dasharray="' + circ + '" stroke-dashoffset="' + off + '" transform="rotate(-90 55 55)" style="transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)"></circle>' +
      '<text x="55" y="52" text-anchor="middle" font-size="30" font-weight="800" fill="' + color + '" font-family="Georgia, serif">' + score + '</text>' +
      '<text x="55" y="70" text-anchor="middle" font-size="10" fill="#777" letter-spacing="1">/ 100</text></svg>';
  }

  function shade(hex) {
    var n = parseInt(hex.slice(1), 16);
    var r = Math.max(0, (n >> 16) - 40), g = Math.max(0, ((n >> 8) & 255) - 30), b = Math.max(0, (n & 255) - 20);
    return "rgb(" + r + "," + g + "," + b + ")";
  }

  function fmt(x) { return (x == null) ? "-" : x; }

  function esc(s) {
    return String(s).replace(/[&<>"]/g, function (ch) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[ch];
    });
  }

  // ---- events ---------------------------------------------------------------
  function onClick(e) {
    var el = e.target.closest ? e.target.closest("[data-act]") : null;
    if (!el) return;
    var act = el.getAttribute("data-act");
    if (act === "tab") { state.tab = el.getAttribute("data-tab"); render(); }
    else if (act === "disease") { state.diseaseId = el.getAttribute("data-id"); render(); }
    else if (act === "toggleBreak") { state.showBreakdown = !state.showBreakdown; render(); }
    else if (act === "quiz") { state.quiz[el.getAttribute("data-idx")] = el.getAttribute("data-val"); render(); }
    // share-wa / share-ig / share-link / cta are wired in the virality + funnel steps
  }

  function onChange(e) {
    var el = e.target;
    if (el && el.getAttribute && el.getAttribute("data-act") === "city") { state.cityId = el.value; render(); }
  }
})();
</script>
</body>
</html>
