name: Deploy Fever Watch to GitHub Pages (staging)

# Builds the device-adaptive SSG and publishes dist/fever-watch/ to GitHub Pages.
# Builds from the committed data/grid.json (currently MOCK trends + positivity), so this is
# a staging deploy: SITE_ENV defaults to "staging", which canonicalises to the github.io URL
# and emits a Disallow-all robots.txt (keeps the staging origin out of search).
#
# One-time setup in the repo: Settings > Pages > Source = "GitHub Actions".
# When the daily/weekly data cron is added later, point its final step at this same build.

on:
  push:
    branches: [master]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build deps (Pillow + share-card text shaping, pinned)
        run: python -m pip install --upgrade pip "Pillow>=11,<13" uharfbuzz==0.55.0 fonttools==4.63.0
      - name: Build the static site
        run: |
          chmod +x tools/resvg/resvg-linux-x86_64   # vendored resvg v0.47.0 (git may drop the x bit)
          python src/build_assets.py        # brand favicons / PWA icons / default OG
          python src/build_share_cards.py   # per-city share cards: og/ (1200x630) + share/ (1080x1440)
          python src/build_site.py          # dist/fever-watch/ : pages + robots/sitemap/manifest
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/fever-watch

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
