name: Deploy Fever Watch to CyberPanel (production)

# Builds the PRODUCTION static export (SITE_ENV=production -> indexable robots, canonical
# at the PUBLIC production URL from FW_PROD_BASE_URL) and rsyncs dist/fever-watch/ into
# public_html/fever-watch/ on the CyberPanel host. The server just serves the pre-rendered
# SSR pages as static files; it runs NO Python and NO PHP rendering. Reuses the canonical
# Python renderer, so the server HTML stays byte-identical to the JS first paint
# (parity_check.js contract holds).
#
# Trigger:
#   - automatically by daily.yml's "dispatch-production" job, the moment the fresh grid.json is
#     committed (~05:15 IST) -> the VPS is updated by ~05:30 IST, and
#   - manually from the Actions tab (workflow_dispatch), e.g. to recover from a failed run.
# The old 00:30-UTC schedule was removed: GitHub delayed that cron ~4h, so it landed ~10:00 IST.
# The daily.yml chain is cron-lag-free. The workflow_run trigger was also removed - it never fired.
#
# One-time repo secrets (Settings > Secrets and variables > Actions):
#   FW_PROD_BASE_URL  the PUBLIC user-facing URL as seen behind the pharmeasy.in reverse
#                     proxy, e.g. https://pharmeasy.in/fever-watch/  -- NOT the CyberPanel
#                     origin hostname. This value becomes every page's canonical, OG url and
#                     sitemap entry, so it must be the URL the public actually visits.
#   DEPLOY_HOST       server hostname or IP
#   DEPLOY_USER       SSH user that owns public_html (CyberPanel site user)
#   DEPLOY_SSH_KEY    private SSH key (the matching public key goes in the server user's
#                     ~/.ssh/authorized_keys)
#   DEPLOY_PATH       absolute remote dir, the DEDICATED fever-watch folder (never public_html
#                     itself; --delete mirrors), e.g. /home/example.com/public_html/fever-watch/
#   DEPLOY_PORT       SSH port (optional; CyberPanel default is 22)
#
# No SSH on the host? See DEPLOY-CYBERPANEL.md for the drop-in FTP/FTPS fallback step.

on:
  # Fired by daily.yml's "dispatch-production" job (a workflow_dispatch sent with GITHUB_TOKEN, which is
  # exempt from the recursion guard) as soon as the fresh data is committed, plus manual runs from the tab.
  workflow_dispatch:

concurrency:
  group: cyberpanel-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        # No explicit ref: checks out the default branch (master) on schedule/workflow_run,
        # or the chosen branch on a manual run -> always the latest committed data.

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build deps (Pillow + share-card text shaping, pinned)
        run: python -m pip install --upgrade pip "Pillow>=11,<13" uharfbuzz==0.55.0 fonttools==4.63.0

      - name: Point base_url at the public production URL
        env:
          FW_PROD_BASE_URL: ${{ secrets.FW_PROD_BASE_URL }}
        run: |
          test -n "$FW_PROD_BASE_URL" || { echo "::error::FW_PROD_BASE_URL secret is not set"; exit 1; }
          python - <<'PY'
          import json, os
          p = "config/site.json"
          cfg = json.load(open(p, encoding="utf-8"))
          cfg["base_url"] = os.environ["FW_PROD_BASE_URL"].rstrip("/") + "/"
          json.dump(cfg, open(p, "w", encoding="utf-8"), ensure_ascii=False, indent=2)
          print("base_url ->", cfg["base_url"])
          PY

      - name: Build production static site
        env:
          SITE_ENV: production
        run: |
          chmod +x tools/resvg/resvg-linux-x86_64   # vendored resvg (git may drop the x bit)
          python src/build_assets.py        # favicons / PWA icons / default OG
          python src/build_share_cards.py   # per-city OG + share cards
          python src/build_site.py          # dist/fever-watch/ : 210 pages + robots/sitemap/manifest

      # MUST run after build_site (which rmtree's dist/) and before the rsync. rsync uses --delete, so a build
      # without crm/ does not just omit the feed, it DELETES it from the VPS. Keep in sync with daily.yml and
      # deploy.yml: EVERY workflow that publishes the site must also build this feed. The prod rows use the
      # *_prod columns (pharmeasy.in), which build_crm_feed emits regardless of SITE_ENV.
      - name: Build CRM catalog feed
        continue-on-error: true        # soft feature; never block the production deploy
        run: python src/build_crm_feed.py   # -> dist/fever-watch/crm/FeverWatch_Cities_catalog.csv

      - name: Sanity-check the production build
        run: |
          test -f dist/fever-watch/index.html
          grep -q 'index,follow' dist/fever-watch/indore/index.html || { echo "::error::prod robots meta missing - is SITE_ENV=production?"; exit 1; }
          test -s dist/fever-watch/crm/FeverWatch_Cities_catalog.csv || echo "::warning::CRM catalog feed missing or empty - the CRM team's pull will 404"
          echo "Pages: $(find dist/fever-watch -mindepth 2 -name index.html | wc -l) cities + landing"

      # Deploy to the VPS with up to 2 automatic retries (3 attempts total). The rsync/SSH step is the only
      # flaky part - a transient "ssh: connect ... Operation timed out" hits when the VPS or its firewall
      # briefly drops the runner. Attempts 1-2 use continue-on-error so a failure falls through to the next
      # (after an escalating pause); attempt 3 is unguarded, so if all three fail the job still fails and you
      # are notified. -a archive, -z compress, -r recurse, --delete keeps the remote an EXACT mirror (safe:
      # the dedicated fever-watch/ folder). Trailing slash copies the CONTENTS of dist/fever-watch/.
      - name: Deploy to CyberPanel via rsync over SSH (attempt 1)
        id: rsync1
        continue-on-error: true
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avzr --delete --exclude='.git'
          path: dist/fever-watch/
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}
          remote_port: ${{ secrets.DEPLOY_PORT || '22' }}

      - name: Pause before retry 1
        if: steps.rsync1.outcome == 'failure'
        run: echo "rsync attempt 1 failed; waiting 30s before retry..."; sleep 30

      - name: Deploy to CyberPanel via rsync over SSH (attempt 2)
        id: rsync2
        if: steps.rsync1.outcome == 'failure'
        continue-on-error: true
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avzr --delete --exclude='.git'
          path: dist/fever-watch/
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}
          remote_port: ${{ secrets.DEPLOY_PORT || '22' }}

      - name: Pause before retry 2
        if: steps.rsync1.outcome == 'failure' && steps.rsync2.outcome == 'failure'
        run: echo "rsync attempt 2 failed; waiting 90s before final retry..."; sleep 90

      - name: Deploy to CyberPanel via rsync over SSH (attempt 3, final)
        id: rsync3
        if: steps.rsync1.outcome == 'failure' && steps.rsync2.outcome == 'failure'
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avzr --delete --exclude='.git'
          path: dist/fever-watch/
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}
          remote_port: ${{ secrets.DEPLOY_PORT || '22' }}
