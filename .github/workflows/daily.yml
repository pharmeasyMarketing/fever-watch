name: Daily refresh + deploy (Fever Watch)

# Pulls fresh weather (NASA POWER, no key) + real Google Trends (SerpApi, 5 keys via
# Actions secrets) DAILY, recomputes the grid, commits the refreshed data back (durable
# history + future RF training set), rebuilds the SSG and deploys to Pages.
#
# Trends provider is 'cached' (TRENDS_PROVIDER=cached) and reads the trends.json this job
# writes. If SerpApi fails, build_trends writes nothing and build_daily falls back to mock
# trends, so a SerpApi hiccup never blocks the deploy (weather stays real). Lab positivity
# stays mock until config/signals.json positivity.csv_url is set.
#
# Trigger now: Actions tab -> "Daily refresh + deploy (Fever Watch)" -> Run workflow. That
# first run also VERIFIES the SerpApi Actions secrets (the "Check secrets" step + build_trends).

on:
  schedule:
    - cron: "30 1 * * *"          # ~07:00 IST daily
  workflow_dispatch:
    inputs:
      force_search_refresh:
        description: "Run the weekly per-state TIMESERIES search refresh now (point #5), even if it is not Monday (~132 SerpApi searches)"
        type: boolean
        default: false

permissions:
  contents: write                  # commit refreshed data back to master
  pages: write
  id-token: write

# Own concurrency group (NOT the shared 'pages' group deploy.yml uses). deploy.yml runs with
# cancel-in-progress:true on group 'pages', so when it shared that group a push-triggered deploy
# would CANCEL an in-flight daily refresh (exactly what happened 2026-06-09: the delayed cron run
# collided with a morning push). Separating the groups lets the daily data pull finish; the actual
# Pages publish is still serialized by the github-pages environment.
concurrency:
  group: fever-daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      # Optional Google Sheet logging (Apps Script Web App webhook). No-op if unset.
      SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
      SHEETS_TOKEN: ${{ secrets.SHEETS_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build deps (Pillow + share-card text shaping; netCDF4/xarray for NOAA CPC rain, pinned)
        run: python -m pip install --upgrade pip "Pillow>=11,<13" uharfbuzz==0.55.0 fonttools==4.63.0 "netCDF4>=1.6,<2" "xarray>=2023"

      - name: Check SerpApi secrets are present (values never printed)
        env:
          K1: ${{ secrets.SERPAPI_KEY }}
          K2: ${{ secrets.SERPAPI_KEY_2 }}
          K3: ${{ secrets.SERPAPI_KEY_3 }}
          K4: ${{ secrets.SERPAPI_KEY_4 }}
          K5: ${{ secrets.SERPAPI_KEY_5 }}
        run: |
          n=0
          for v in "$K1" "$K2" "$K3" "$K4" "$K5"; do [ -n "$v" ] && n=$((n+1)); done
          echo "SerpApi keys present: $n / 5"
          if [ "$n" -eq 0 ]; then echo "::error::No SerpApi secrets found - add SERPAPI_KEY..._5"; exit 1; fi

      - name: Build weather (NOAA CPC rain + NASA POWER temp/humidity)
        id: weather
        run: python src/build_weather.py
      - name: Log weather
        if: always()
        run: python src/sheetlog.py log weather ${{ steps.weather.outcome }} "NOAA CPC + NASA POWER pull" "${{ steps.weather.outcome != 'success' && 'pull did not finish - run cancelled (e.g. a concurrent deploy) or a weather-provider error' || '' }}"

      - name: Build trends (SerpApi, real)
        id: trends
        continue-on-error: true
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPAPI_KEY_2: ${{ secrets.SERPAPI_KEY_2 }}
          SERPAPI_KEY_3: ${{ secrets.SERPAPI_KEY_3 }}
          SERPAPI_KEY_4: ${{ secrets.SERPAPI_KEY_4 }}
          SERPAPI_KEY_5: ${{ secrets.SERPAPI_KEY_5 }}
        run: python src/build_trends.py || echo "::warning::build_trends failed; build_daily will fall back to mock trends"
      - name: Log trends
        if: always()
        run: python src/sheetlog.py log trends ${{ steps.trends.outcome }} "SerpApi Google Trends" "${{ steps.trends.outcome != 'success' && 'SerpApi pull failed - the grid keeps last-good cached trends (mock only on cold start)' || '' }}"

      - name: Build grid (cached real trends; mock fallback if trends missing)
        id: grid
        env:
          TRENDS_PROVIDER: cached
        run: python src/build_daily.py
      - name: Log grid + push raw data
        if: always()
        run: |
          python src/sheetlog.py log grid ${{ steps.grid.outcome }} "consolidation engine" "${{ steps.grid.outcome != 'success' && 'grid build did not finish - run cancelled or a weather/trends input problem' || '' }}"
          python src/sheetlog.py raw data/grid.json

      - name: Refresh season-trend archive (this-year line) from today's grid
        if: steps.grid.outcome == 'success'
        continue-on-error: true        # soft feature; a hiccup must never block the daily refresh + deploy
        run: python src/build_archive.py --daily   # weather ty exact from grid.json + length-pad search ty; no backfill inputs needed

      # Point #5: EXACT cross-year SEARCH YoY. Weekly (Mondays, aligned to the 1-Jun season week boundary so
      # the archive's as_of index advances on the same day the search line is recomputed), a per-state TIMESERIES
      # re-pull puts last-year and this-year search on ONE Google normalisation, replacing the directional value
      # the daily step used to inject. Folded into THIS workflow (not a separate weekly.yml) so the minified
      # single-line archive JSON has exactly one writer/commit and never git-conflicts. ~132 SerpApi searches.
      - name: Decide if the weekly search refresh runs today (Mon = 1, or forced via dispatch)
        id: dow
        run: |
          DOW=$(date -u +%u)
          FORCE="${{ github.event.inputs.force_search_refresh }}"
          echo "UTC day-of-week=$DOW (1=Mon); force_search_refresh=$FORCE"
          if [ "$DOW" = "1" ] || [ "$FORCE" = "true" ]; then echo "weekly=true" >> "$GITHUB_OUTPUT"; else echo "weekly=false" >> "$GITHUB_OUTPUT"; fi

      - name: Weekly EXACT search YoY - per-state TIMESERIES re-pull + archive recompute (point #5)
        if: steps.grid.outcome == 'success' && steps.dow.outputs.weekly == 'true'
        continue-on-error: true        # soft feature; never block the daily refresh + deploy
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPAPI_KEY_2: ${{ secrets.SERPAPI_KEY_2 }}
          SERPAPI_KEY_3: ${{ secrets.SERPAPI_KEY_3 }}
          SERPAPI_KEY_4: ${{ secrets.SERPAPI_KEY_4 }}
          SERPAPI_KEY_5: ${{ secrets.SERPAPI_KEY_5 }}
        run: python src/refresh_trends_timeseries.py && python src/build_archive.py --search-only

      - name: Commit refreshed data back
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weather.json data/trends.json data/grid.json data/history.json data/archive/trend_series.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: daily refresh (weather + real trends + grid) [skip ci]"
            git push || echo "::warning::data push failed (non-fatal)"
          fi

      - name: Build static site
        id: site
        run: |
          chmod +x tools/resvg/resvg-linux-x86_64   # vendored resvg v0.47.0 (git may drop the x bit)
          python src/build_assets.py
          python src/build_share_cards.py
          python src/build_site.py
      - name: Log site build
        if: always()
        run: python src/sheetlog.py log site ${{ steps.site.outcome }} "build_share_cards + build_site (SSG)" "${{ steps.site.outcome != 'success' && 'SSG build did not finish - run cancelled or a build error' || '' }}"
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist/fever-watch

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
